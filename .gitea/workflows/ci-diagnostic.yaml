name: CI Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Diagnose Runner
    runs-on: ubuntu-latest

    steps:

      - name: CI Worker Identity
        run: |
          echo "================================"
          echo "CI WORKER"
          echo "================================"

          cat /etc/os-release

          echo
          echo "Tools"

          python --version
          uv --version
          jq --version
          yq --version
      
      - name: CI Context
        run: |
          echo "======================================"
          echo "CI RUN CONTEXT"
          echo "======================================"

          echo "Repository : $GITHUB_REPOSITORY"
          echo "Commit     : $GITHUB_SHA"
          echo "Ref        : $GITHUB_REF"
          echo "Runner OS  : $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Runner Name: $RUNNER_NAME"
          echo "Started    : $(date)"

      - name: System Information
        run: |
          echo
          echo "======================================"
          echo "SYSTEM"
          echo "======================================"

          uname -a

          echo
          echo "Disk:"
          df -h

          echo
          echo "Memory:"
          free -h || true


      - name: Tool Inventory
        run: |
          echo
          echo "======================================"
          echo "TOOLS"
          echo "======================================"

          echo "--- Python ---"
          python --version || true

          echo
          echo "--- Pip ---"
          pip --version || true

          echo
          echo "--- UV ---"
          uv --version || true

          echo
          echo "--- Node ---"
          node --version || true

          echo
          echo "--- Docker ---"
          docker --version || true

          echo
          echo "--- Buildx ---"
          docker buildx version || true

          echo
          echo "--- Git ---"
          git --version


      - name: Environment Inspection
        run: |
          echo
          echo "======================================"
          echo "ENVIRONMENT"
          echo "======================================"

          echo "Action:"
          echo "$GITHUB_ACTIONS"

          echo
          echo "Runner variables:"
          env | grep RUNNER || true

          echo
          echo "Workspace:"
          pwd
          ls -la


      - name: Cache Test
        id: cache-test
        uses: actions/cache@v4
        with:
          path: diagnostic-cache
          key: diagnostic-cache-v1


      - name: Cache Verification
        run: |
          echo
          echo "======================================"
          echo "CACHE"
          echo "======================================"

          if [ "${{ steps.cache-test.outputs.cache-hit }}" = "true" ]; then
            echo "✓ Cache restored"
          else
            echo "⚠ Cache miss - creating initial cache"
          fi

          mkdir -p diagnostic-cache

          date > diagnostic-cache/timestamp.txt

          cat diagnostic-cache/timestamp.txt


      - name: Docker Capability Test
        run: |
          echo
          echo "======================================"
          echo "DOCKER"
          echo "======================================"

          docker info || true


      - name: Completion Summary
        if: always()
        run: |
          echo
          echo "======================================"
          echo "DIAGNOSTIC COMPLETE"
          echo "======================================"

          echo "Finished: $(date)"