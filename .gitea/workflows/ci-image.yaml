name: Build CI Worker Image

on:
  workflow_dispatch:

  push:
    paths:
      - infrastructure/images/ci-runner/**


jobs:

  build:

    name: Build CI Worker

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Docker Info
        run: |
          docker version
          docker info


      - name: Build CI Worker Image
        run: |
          docker build \
            -t aiassistant-ci:test \
            infrastructure/images/ci-runner


      - name: Test CI Worker Image
        run: |
          docker run --rm aiassistant-ci:test sh -c "
            python --version &&
            uv --version &&
            jq --version &&
            yq --version
          "


      - name: Complete
        run: |
          echo "CI worker image build successful"