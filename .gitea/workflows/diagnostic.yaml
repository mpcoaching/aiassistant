name: CI Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:

      - name: System Information
        run: |
          echo "=== SYSTEM ==="
          uname -a
          echo

          echo "=== USER ==="
          whoami
          echo

      - name: Tooling
        run: |
          echo "=== PYTHON ==="
          python --version || true

          echo
          echo "=== DOCKER ==="
          docker version || true

          echo
          echo "=== GIT ==="
          git --version

      - name: Environment Check
        run: |
          echo "=== ENVIRONMENT ==="

          echo "GITHUB_PAT length:"
          echo "${#GITHUB_PAT}"

          echo
          echo "Runner:"
          env | grep RUNNER || true

      - name: Test Actions Cache
        uses: actions/cache@v4
        with:
          path: test-cache
          key: diagnostic-cache-v1

      - name: Verify Cache
        run: |
          echo "=== CACHE TEST ==="

          mkdir -p test-cache

          echo "cache test $(date)" > test-cache/test.txt

          cat test-cache/test.txt