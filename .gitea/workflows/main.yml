name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    # Removed the 'needs' blocker so this runs first
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery test all unit

  build-and-push:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python Environment
        run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
        
      - name: Create Custom Buildx Configuration (As Code)
        run: |
          # Generate a local buildx configuration profile dynamically
          mkdir -p .buildx
          cat <<EOF > .buildx/buildx-config.toml
          [registry."registry.local.test"]
            insecure = true
          EOF

          # Create and switch to a custom builder instance utilizing this config
          docker buildx create --name ia-builder --config .buildx/buildx-config.toml --use
          docker buildx inspect --bootstrap

      - name: Build Changes
        run: . .venv/bin/activate && delivery build all --changed
        
      - name: Publish to Local Registry
        run: . .venv/bin/activate && delivery publish all
        
      - name: Clean Up Builder Instance
        if: always()
        run: docker buildx rm ia-builder || true


  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery deploy dev all

  validate:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery validate dev

  push-to-github:
    needs: validate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # New explicitly contained step to extract and inject the token inline
      - name: Extract Token and Mirror to GitHub
        run: |
          export GIT_TERMINAL_PROMPT=0
          
          # 1. Parse the main .env file directly from the repo directory to find GITHUB_PAT
          if [ -f ".env" ]; then
            # Read the variable line, strip out returns, and assign to a local shell string
            LOCAL_TOKEN=$(grep -E "^GITHUB_PAT=" .env | cut -d'=' -f2- | tr -d '\r\n"')
          else
            echo "❌ ERROR: Could not find your main .env file in the repository root!"
            exit 1
          fi
          
          # 2. Check if the parsed token value returned completely blank
          if [ -z "${LOCAL_TOKEN}" ]; then
            echo "❌ ERROR: GITHUB_PAT was not found or is empty inside your main .env file!"
            exit 1
          fi
          
          # 3. Configure the destination URLs dynamically using the found value
          git remote add github https://x-token-auth:${LOCAL_TOKEN}@://github.com || \
          git remote set-url github https://x-token-auth:${LOCAL_TOKEN}@://github.com
          
          # 4. Push changes straight out to GitHub main
          git push github HEAD:main --force
