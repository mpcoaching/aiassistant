name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Adjust to your matching Python version

      - name: Cache Python Virtual Env
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('delivery/requirements.txt') }}

      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r delivery/requirements.txt
          pip install -e delivery/

      - name: Run Unit Tests
        run: |
          . .venv/bin/activate
          delivery test all unit

  build-and-push:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python Virtual Env
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('delivery/requirements.txt') }}
        
      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r delivery/requirements.txt
          pip install -e delivery/
        
      - name: Create Custom Buildx Configuration (As Code)
        run: |
          mkdir -p .buildx
          cat <<EOF > .buildx/buildx-config.toml
          [registry."registry.local.test"]
            insecure = true
          EOF

          docker buildx create --name ia-builder --config .buildx/buildx-config.toml --use
          docker buildx inspect --bootstrap

      - name: Build Changes
        run: |
          . .venv/bin/activate
          delivery build all --changed
        
      - name: Publish to Local Registry
        run: |
          . .venv/bin/activate
          delivery publish all
        
      - name: Clean Up Builder Instance
        if: always()
        run: docker buildx rm ia-builder || true


  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python Virtual Env
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('delivery/requirements.txt') }}

      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r delivery/requirements.txt
          pip install -e delivery/

      - name: Deploy
        run: |
          . .venv/bin/activate
          delivery deploy dev all

  validate:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python Virtual Env
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('delivery/requirements.txt') }}

      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r delivery/requirements.txt
          pip install -e delivery/

      - name: Validate Deployment
        run: |
          . .venv/bin/activate
          delivery validate dev

  push-to-github:
    needs: validate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Extract Token and Mirror to GitHub
        run: |
          export GIT_TERMINAL_PROMPT=0
          
          if [ -f ".env" ]; then
            LOCAL_TOKEN=$(grep -E "^GITHUB_PAT=" .env | cut -d'=' -f2- | tr -d '\r\n"')
          else
            echo "❌ ERROR: Could not find your main .env file in the repository root!"
            exit 1
          fi
          
          if [ -z "${LOCAL_TOKEN}" ]; then
            echo "❌ ERROR: GITHUB_PAT was not found or is empty inside your main .env file!"
            exit 1
          fi
          
          git remote add github https://x-token-auth:${LOCAL_TOKEN}@://github.com || \
          git remote set-url github https://x-token-auth:${LOCAL_TOKEN}@://github.com
          
          git push github HEAD:main --force
