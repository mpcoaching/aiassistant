name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  runner-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash cicd/scripts/runner-healthcheck.sh

  unit-tests:
    needs: runner-health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery test all unit

  build-and-push:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery build all --changed
      - run: . .venv/bin/activate && delivery publish all

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery deploy dev all

  validate:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery validate dev

  push-to-github:
    needs: validate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - run: git remote add github https://${{ secrets.MIRROR_PAT }}@github.com/yourorg/aiassistant.git || git remote set-url --push github https://${{ secrets.MIRROR_PAT }}@github.com/yourorg/aiassistant.git
      - run: git push github HEAD:main --force --verbose
