name: PR Pipeline

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  runner-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash cicd/scripts/runner-healthcheck.sh

  unit-tests:
    needs: runner-health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && . .venv/bin/activate && pip install -r delivery/requirements.txt && pip install -e delivery/
      - run: . .venv/bin/activate && delivery test all unit
