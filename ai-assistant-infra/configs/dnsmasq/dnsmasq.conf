# 1. The local override
address=/.local.test/192.168.1.30

# 2. Forward everything else to standard public resolvers
server=8.8.8.8
server=1.1.1.1

# 3. Important: Prevent local traffic from leaking to public DNS
# This forces dnsmasq to answer local queries itself
domain-needed
bogus-priv

no-hosts