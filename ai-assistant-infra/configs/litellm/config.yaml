model_list:
  # --- CODING ---
  - model_name: coding
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY
    order: 1

  - model_name: coding
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
    order: 2

  - model_name: coding
    litellm_params:
      model: github/gpt-4o
      api_base: https://models.inference.ai.azure.com
      api_key: os.environ/GITHUB_TOKEN
    order: 3

  - model_name: coding
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
    order: 4

  - model_name: coding
    litellm_params:
      model: openai/huggingface.co/qwen/qwen2.5-coder-7b-instruct-gguf:Q4_K_M
      api_base: http://model-runner:12434/engines/llama.cpp/v1
      api_key: DUMMY
    order: 5

  - model_name: coding-local-2
    litellm_params:
      model: openai/google/gemma-3-4b-it-GGUF:Q4_K_M
      api_base: http://model-runner:12434/engines/llama.cpp/v1
      api_key: dummy
      model_config:
        supports_function_calling: false
    order: 1

  - model_name: coding-local-2
    litellm_params:
      model: openai/huggingface.co/bartowski/deepseek-coder-v2-lite-instruct-gguf:Q4_K_M
      api_base: http://model-runner:12434/engines/llama.cpp/v1
      api_key: dummy
    order: 2

  # --- ARCHITECTURE ---
  - model_name: architecture
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
    order: 1
    
  - model_name: architecture
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
    order: 2
    
  - model_name: architecture
    litellm_params:
      model: openai/huggingface.co/Qwen/Qwen2.5-Coder-3B-Instruct-GGUF:Q4_K_M
      api_base: http://model-runner:12434/engines/llama.cpp/v1
      api_key: dummy
    order: 3

  # --- UTILITY / FAST ---
  - model_name: fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
    order: 1
    
  - model_name: fast
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
    order: 2
    
  - model_name: fast
    litellm_params:
      model: openai/huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF:Q4_K_M
      api_base: http://model-runner:12434/engines/llama.cpp/v1
      api_key: dummy
    order: 3

router_settings:
  routing_strategy: "simple-shuffle"
  enable_pre_call_checks: true
  num_retries: 5
  disable_mid_stream_continuation: true
  fallback_on_client_errors: true
  request_timeout: 300
  stream_timeout: 60
  allowed_fails_per_model: 3
  retry_after: 5
  fallbacks:
    - coding:
        - coding
    - architecture:
        - architecture
    - fast:
        - fast
  cooldown_time: 30  # Seconds to keep a model unavailable after failing
