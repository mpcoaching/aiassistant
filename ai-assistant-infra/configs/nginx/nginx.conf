events { worker_connections 1024; }
http {
    resolver 127.0.0.11 valid=5s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 3600s;

    # Add this above your n8n server block
    server {
        listen 80 default_server;
        server_name _;
        return 404 "Subdomain not configured or missing Host header";
    }

    #server { listen 80; server_name n8n.local.test; location / { proxy_pass http://n8n:5678; } }
    #server { listen 80; server_name dev.local.test; location / { proxy_pass http://dev-controller:8443; } }
    server { listen 80; server_name oo.local.test; location / { proxy_pass http://openobserve:5080; } }
    server { listen 80; server_name lf.local.test; location / { proxy_pass http://langfuse:3000; } }
    server { listen 80; server_name otel.local.test; location / { proxy_pass http://otel-collector:4318; } }
    server { listen 80; server_name litellm.local.test; location / { proxy_pass http://litellm:4000; } }
    server { listen 80; server_name langgraph.local.test; location / { proxy_pass http://langgraph:8000; } }
    server { listen 80; server_name workflow-engine.local.test; location / { proxy_pass http://workflow-engine:8000; } }
    server { listen 80; server_name aider.local.test; location / { proxy_pass http://aider:8501; } }
    server {
        listen 80;
        server_name autogen.local.test;

        location / {
            # Points to the AutoGen Studio docker service name and its internal UI port
            proxy_pass http://autogen-studio:8081; 
        }
    }


    
    server {
        listen 80;
        server_name control-center.local.test;
        location / {
            proxy_pass http://control-center-ui:80;
        }
    }

    server {
        listen 80;
        server_name control-center-dev.local.test;
        location / {
            proxy_pass http://control-center-ui-dev:5173;
        }
    }

    # 1. Handle REST API & Web UI Dashboard
    server {
        listen 80;
        server_name qdrant.local.test;

        # Maximum size for vector payload uploads
        client_max_body_size 100M; 

        location / {
            proxy_pass http://qdrant:6333;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Handle High-Performance gRPC Traffic
    server {
        listen 6334; # Listens on 6334 using HTTP/2 protocol required by gRPC
	    http2 on;
        server_name qdrant.local.test;

        location / {
            grpc_pass grpc://qdrant:6334;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

}
