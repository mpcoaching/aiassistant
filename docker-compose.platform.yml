# Tier 0 — Platform substrate (always-on, shared) + CI stack (TeamCity + Gitea)
# Owns ai_net + monitoring-net. Agentic stack declares these as external.
# Start first: docker compose -f docker-compose.platform.yml up -d

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: local_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - ./ai-assistant-infra/configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    command:
      - sh
      - -c
      - |
        nginx -g 'daemon off;' &
        LAST=$(md5sum /etc/nginx/nginx.conf)
        while true; do
          sleep 5
          CUR=$(md5sum /etc/nginx/nginx.conf)
          if [ "$$LAST" != "$$CUR" ]; then
            nginx -s reload && echo "nginx: config reloaded"
            LAST=$$CUR
          fi
        done

  dns:
    image: strm/dnsmasq
    container_name: dns
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./ai-assistant-infra/configs/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf
    cap_add:
      - NET_ADMIN
    networks:
      - ai_net
      - monitoring-net

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - postgres_db:/var/lib/postgresql/data

  db-bootstrapper:
    image: python:3.11-alpine
    volumes:
      - ./ai-assistant-infra/db-setup:/db-setup:ro
    env_file:
      - .env
    environment:
      - PGPASSWORD=${POSTGRES_DB_PASSWORD}
    command:
      - sh
      - -c
      - |
        apk add --no-cache postgresql-client gettext &&
        sh /db-setup/bootstrap.sh
    networks:
      - ai_net
    restart: on-failure

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    volumes:
      - ./ai-assistant-infra/migrations:/migrations
    env_file:
      - .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://${AIASSIST_DB_USER}:${AIASSIST_DB_PASSWORD}@postgres:5432/${AIASSIST_DB_NAME}?sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations
    command:
      - up
    depends_on:
      db-bootstrapper:
        condition: service_completed_successfully
    networks:
      - ai_net
    restart: on-failure

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_KEY}
    networks:
      - ai_net
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - 6333
      - 6334
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_bus
    ports:
      - 15672:15672
    networks:
      - ai_net
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio
    container_name: minio
    profiles: ["disabled"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - ai_net
    restart: unless-stopped

  redis-agents:
    image: redis:7-alpine
    container_name: redis_agents
    networks:
      - ai_net
    restart: unless-stopped
    volumes:
      - redis_agents_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["disabled"]
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - ai_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: langfuse_redis
    volumes:
      - langfuse_redis_data:/data
    networks:
      - monitoring-net
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: langfuse_clickhouse
    env_file: .env
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB_NAME}
      - CLICKHOUSE_USER=${CLICKHOUSE_DB_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_DB_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "-u", "${CLICKHOUSE_DB_USER}", "--password", "${CLICKHOUSE_DB_PASSWORD}", "-q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    depends_on:
      migrate:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      # Core settings
      - HOSTNAME=${LANGFUSE_HOSTNAME}
      - DATABASE_URL=${LANGFUSE_DATABASE_URL}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}

      # ClickHouse Integration
      - CLICKHOUSE_USER=${CLICKHOUSE_DB_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_DB_PASSWORD}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - CLICKHOUSE_MIGRATION_URL=${CLICKHOUSE_MIGRATION_URL}

      # Storage & Redis
      - REDIS_URL=${LANGFUSE_REDIS_URL}
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=${LANGFUSE_S3_MEDIA_UPLOAD_BUCKET}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      - LANGFUSE_S3_ENDPOINT=${LANGFUSE_S3_ENDPOINT}
      - LANGFUSE_STORAGE_TYPE=${LANGFUSE_STORAGE_TYPE}

      # Tracing Settings
      - LANGCHAIN_TRACING_V2=${LANGFUSE_LANGCHAIN_TRACING_V2}
      - LANGCHAIN_ENDPOINT=${LANGFUSE_LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGFUSE_LANGCHAIN_API_KEY}
      - CLICKHOUSE_CLUSTER_ENABLED=false
    networks:
      - monitoring-net
    volumes:
      - langfuse_data:/data
    restart: always

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    env_file:
      - .env
    user: 0:0
    privileged: true
    security_opt:
      - label:disable
    volumes:
      - ./ai-assistant-infra/configs/otel:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    group_add:
      - "999"
    command:
      - --config=/config/otel-collector.config.yaml
    networks:
      - monitoring-net
    restart: unless-stopped

  openobserve:
    image: openobserve/openobserve:latest
    container_name: openobserve
    expose:
      - 5080
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - ZO_DATA_DIR=/data
      - ZO_LOCAL_MODE=true
    volumes:
      - openobserve_storage:/data
    networks:
      - monitoring-net
    restart: always

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - DB_TYPE=${N8N_DB_TYPE}
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_DATABASE}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_OTEL_ENABLED=${N8N_OTEL_ENABLED}
      - N8N_OTEL_SERVICE_NAME=${N8N_OTEL_SERVICE_NAME}
      - N8N_OTEL_EXPORTER_OTLP_ENDPOINT=${N8N_OTEL_EXPORTER_OTLP_ENDPOINT}
      - LANGCHAIN_TRACING_V2=${N8N_LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${N8N_LANGCHAIN_API_KEY}
      - LANGCHAIN_ENDPOINT=${N8N_LANGCHAIN_ENDPOINT}
      - LANGCHAIN_PROJECT=${N8N_LANGCHAIN_PROJECT}
    profiles: ["disabled"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - n8n_data:/home/node/.n8n

  # ===== CI: Gitea (git source of truth) =====
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://gitea.local.test/
      - GITEA__server__SSH_DOMAIN=gitea.local.test
      - GITEA__webhook__ALLOWED_HOST_LIST=teamcity-server:8111
      - GITEA__service__DISABLE_REGISTRATION=false
    restart: unless-stopped
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - postgres

  # ===== CI: TeamCity server (backed by shared Postgres `teamcity` DB) =====
  teamcity-server:
    image: jetbrains/teamcity-server:latest
    container_name: teamcity-server
    environment:
      - TEAMCITY_SERVER_OPTS=-Dteamcity.db.pg.connUrl=jdbc:postgresql://postgres:5432/${TEAMCITY_DB_NAME} -Dteamcity.db.pg.user=${TEAMCITY_DB_USER} -Dteamcity.db.pg.password=${TEAMCITY_DB_PASSWORD}
    restart: unless-stopped
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - teamcity_data:/data/teamcity_server/datadir
      - teamcity_logs:/opt/teamcity/logs
    depends_on:
      postgres:
        condition: service_healthy

  # ===== CI: TeamCity build agent (uses host docker.sock) =====
  teamcity-agent:
    image: jetbrains/teamcity-agent:latest
    container_name: teamcity-agent
    environment:
      - SERVER_URL=http://teamcity-server:8111
      - AGENT_NAME=agentic-builder
    restart: unless-stopped
    privileged: true
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - teamcity_agent_conf:/opt/buildagent/conf
    depends_on:
      - teamcity-server

networks:
  ai_net:
    name: ai_net
    driver: bridge
  monitoring-net:
    name: monitoring-net
    driver: bridge

volumes:
  postgres_db:
  n8n_data:
  openobserve_storage:
  clickhouse_data:
  qdrant_data:
  minio_data:
  rabbitmq_data:
  ollama_models:
  langfuse_redis_data:
  redis_agents_data:
  langfuse_data:
  gitea_data:
  teamcity_data:
  teamcity_logs:
  teamcity_agent_conf:
