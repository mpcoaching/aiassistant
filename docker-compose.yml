services:
  nginx-proxy:
    image: nginx:alpine
    container_name: local_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - ./ai-assistant-infra/configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Relative path!

  control-center-ui:
    build:
      context: ./agentic/src/control-center-ui
      dockerfile: Dockerfile
      target: live
    container_name: control_center_ui
    expose:
      - 80
    networks:
      - ai_net
    restart: unless-stopped

  control-center-ui-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./agentic/src/control-center-ui:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - ai_net
    restart: unless-stopped

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai_net
      - monitoring-net
  db-bootstrapper:
    image: postgres:16-alpine
    volumes:
      - ./ai-assistant-infra/db-setup:/db-setup
    env_file:
      - .env
    environment:
      - PGPASSWORD=${POSTGRES_DB_PASSWORD}
    command: >
      sh -c "
      apk add --no-cache gettext &&
      until pg_isready -h ${POSTGRES_HOST} -U ${POSTGRES_DB_USER}; do sleep 2; done &&
      cat /db-setup/001_create_databases.sql | envsubst | psql -a -v ON_ERROR_STOP=1 -h ${POSTGRES_HOST} -U ${POSTGRES_DB_USER} -d postgres &&
      cat /db-setup/002_create_users.sql | envsubst | psql -a -v ON_ERROR_STOP=1 -h ${POSTGRES_HOST} -U ${POSTGRES_DB_USER} -d postgres &&
      cat /db-setup/003_apply_permissions.sql | envsubst | psql -a -v ON_ERROR_STOP=1 -h ${POSTGRES_HOST} -U ${POSTGRES_DB_USER} -d postgres
      "
    networks:
      - ai_net
  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    volumes:
      - ./ai-assistant-infra/migrations:/migrations
    env_file:
      - .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://${AIASSIST_DB_USER}:${AIASSIST_DB_PASSWORD}@postgres:5432/${AIASSIST_DB_NAME}?sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations
    command:
      - up
    depends_on:
      db-bootstrapper:
        condition: service_completed_successfully
    networks:
      - ai_net
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_KEY}
    networks:
      - ai_net
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - 6333
      - 6334
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_bus
    ports:
      - 15672:15672
    networks:
      - ai_net
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  minio:
    image: minio/minio
    container_name: minio
    profiles: ["disabled"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - ai_net
    restart: unless-stopped
  redis-agents:
    image: redis:7-alpine
    container_name: redis_agents
    networks:
      - ai_net
    restart: unless-stopped
    volumes:
      - redis_agents_data:/data
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["disabled"]
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - ai_net
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: langfuse_redis
    volumes:
      - langfuse_redis_data:/data
    networks:
      - monitoring-net
    restart: unless-stopped
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: langfuse_clickhouse
    env_file: .env
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB_NAME}
      - CLICKHOUSE_USER=${CLICKHOUSE_DB_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_DB_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - monitoring-net
    # ADD A HEALTHCHECK: This prevents Langfuse from starting too early
    healthcheck:
      test: ["CMD", "clickhouse-client", "-u", "${CLICKHOUSE_DB_USER}", "--password", "${CLICKHOUSE_DB_PASSWORD}", "-q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    depends_on:
      migrate:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      # Core settings
      - HOSTNAME=${LANGFUSE_HOSTNAME}
      - DATABASE_URL=${LANGFUSE_DATABASE_URL}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      
      # ClickHouse Integration
      - CLICKHOUSE_USER=${CLICKHOUSE_DB_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_DB_PASSWORD}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - CLICKHOUSE_MIGRATION_URL=${CLICKHOUSE_MIGRATION_URL}
      
      # Storage & Redis
      - REDIS_URL=${LANGFUSE_REDIS_URL}
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=${LANGFUSE_S3_MEDIA_UPLOAD_BUCKET}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      - LANGFUSE_S3_ENDPOINT=${LANGFUSE_S3_ENDPOINT}
      - LANGFUSE_STORAGE_TYPE=${LANGFUSE_STORAGE_TYPE}
      
      # Tracing Settings
      - LANGCHAIN_TRACING_V2=${LANGFUSE_LANGCHAIN_TRACING_V2}
      - LANGCHAIN_ENDPOINT=${LANGFUSE_LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGFUSE_LANGCHAIN_API_KEY}
      - CLICKHOUSE_CLUSTER_ENABLED=false
    networks:
      - monitoring-net
    volumes:
      - langfuse_data:/data
    restart: always
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    env_file:
      - .env
    user: 0:0
    privileged: true
    security_opt:
      - label:disable
    volumes:
      - ./ai-assistant-infra/configs/otel:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    group_add:
      - "999"
    command:
      - --config=/config/otel-collector.config.yaml
    networks:
      - monitoring-net
    restart: unless-stopped
  openobserve:
    image: openobserve/openobserve:latest
    container_name: openobserve
    expose:
      - 5080
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - ZO_DATA_DIR=/data
      - ZO_LOCAL_MODE=true
    volumes:
      - openobserve_storage:/data
    networks:
      - monitoring-net
    restart: always
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - DB_TYPE=${N8N_DB_TYPE}
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_DATABASE}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_OTEL_ENABLED=${N8N_OTEL_ENABLED}
      - N8N_OTEL_SERVICE_NAME=${N8N_OTEL_SERVICE_NAME}
      - N8N_OTEL_EXPORTER_OTLP_ENDPOINT=${N8N_OTEL_EXPORTER_OTLP_ENDPOINT}
      - LANGCHAIN_TRACING_V2=${N8N_LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${N8N_LANGCHAIN_API_KEY}
      - LANGCHAIN_ENDPOINT=${N8N_LANGCHAIN_ENDPOINT}
      - LANGCHAIN_PROJECT=${N8N_LANGCHAIN_PROJECT}
    profiles: ["disabled"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - n8n_data:/home/node/.n8n
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    expose:
      - 4000
    volumes:
      - ./ai-assistant-infra/configs/litellm/config.yaml:/app/config/config.yaml
    env_file:
      - .env
    command:
      - --config
      - /app/config/config.yaml
      - --port
      - "4000"
    environment:
      - STORE_MODEL_IN_DB=False
      - LITELLM_CONFIG_PATH=/app/config/config.yaml
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - DATABASE_URL=postgresql://${LITELLM_DB_USER}:${LITELLM_DB_PASSWORD}@postgres:5432/${LITELLM_DB_NAME}
      - REDIS_URL=redis://redis-agents:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      #- LITELLM_LOG=DEBUG
      - RELOAD_CONFIG_FROM_DISK=True
    networks:
      - ai_net
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis-agents:
        condition: service_started
  langgraph:
    build: 
       context: ./agents/langgraph
       dockerfile: Dockerfile
    container_name: langgraph
    env_file:
       - .env
    expose:
      - 8000
    environment:
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_ENDPOINT=http://langfuse:3000/api/v1/otel
      - LANGCHAIN_API_KEY=sk-lf-fb403b7e-a2c6-40c9-b3c5-e2e4e4071516
      - DATABASE_URI=postgresql://${LANGGRAPH_DB_USER}:${LANGGRAPH_DB_PASSWORD}@postgres:5432/${LANGGRAPH_DB_NAME}
      - REDIS_URI=redis://redis-agents:6379
    depends_on:
      - postgres
    volumes:
      - langgraph_config:/app/config
    networks:
      - ai_net
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./agentic/src/workflow-runner
      dockerfile: Dockerfile
    container_name: workflow_engine
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URL=postgresql://${AIASSIST_DB_USER}:${AIASSIST_DB_PASSWORD}@postgres:5432/${AIASSIST_DB_NAME}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - LANGGRAPH_URL=http://langgraph:8000
      - REPO_ROOT=/aiassistant
    volumes:
      - .:/aiassistant:cached,z
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      langgraph:
        condition: service_started
    networks:
      - ai_net
    restart: unless-stopped

  openhands:
    image: ghcr.io/openhands/openhands:latest
    container_name: openhands
    restart: unless-stopped
    env_file: 
      - .env
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=latest-python
      - WORKSPACE_MOUNT_PATH=/opt/workspace_base
      - LOG_ALL_EVENTS=true
      - LLM_MODEL=groq/openai/gpt-oss-120b
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_API_KEY=${FULL_ACCESS_KEY}
      - LLM_API_KEY=${FULL_ACCESS_KEY}
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENHANDS_CONFIG_DIR=/home/openhands/.openhands
      - OH_SKIP_AGENT_SERVER_VERSION_CHECK=1
      - DISABLE_DEFAULT_MCP_SERVER=1
      - PYTHONPATH=/app:/app/openhands:/runtime/openhands
      - SANDBOX_RUNTIME_DEBUG=true
      - CONFIG_DIR=/home/openhands/.openhands
      - SANDBOX_RUNTIME_NETWORK=ai_net
      - SANDBOX_RUNTIME_BINDING_ADDRESS=0.0.0.0
      - WORKSPACE_MOUNT_PATH=${PWD}/workspace 
      - SANDBOX_CONTAINER_URL_PATTERN=http://openhands.local.test:{port}
      - OH_WEB_URL=http://openhands.local.test
      - WEB_HOST=openhands:3000
      - OH_USE_HOST_NETWORK=true
      - RUNTIME_IMAGE=ghcr.io/all-hands-ai/runtime:latest
      - RUNTIME_CONTAINER_NAME=openhands-sandbox
      - SANDBOX_DNS=192.168.1.30
      - USE_HTTPS=false
      - DISABLE_HTTPS_REDIRECT=true
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    profiles: ["disabled"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true # Allows interactive container streams
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
      - ./workspace:/opt/workspace_base
      - ./ai-assistant-infra/configs/openhands/.openhands/skills:/root/.openhands/skills
      - ./ai-assistant-infra/configs/openhands/.openhands:/home/openhands/.openhands
    networks:
      - ai_net

  aider:
    image: paulgauthier/aider-full:latest
    container_name: aider
    # Enables the interactive terminal flags (-it) needed by Aider
    tty: true
    stdin_open: true
    # Instructs Aider to host the browser UI on launch
    command: ["--browser", "--model", "litellm_proxy/coding"]
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=http://litellm:4000/v1
      #- ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Prevents Git ownership warnings inside the isolated environment
      - GIT_CEILING_DIRECTORIES=/app
      - AIDER_CONFIG=${AIDER_CONFIG:-.aider/code-phase.yml}
    networks:
      - ai_net
    depends_on:
      - litellm
    profiles: ["disabled"]

  workspace:
    image: ubuntu:24.04
    container_name: dev_workspace
    restart: unless-stopped
    security_opt:
      - label:disable # Critical for Fedora/SELinux
    volumes:
      # Mounts your laptop root folder directly to /aiassistant inside the container
      - .:/aiassistant:cached,z
      - ./ai-assistant-infra/configs:/aiassistant/ai-assistant-infra/configs:cached,z
    environment:
      - LANGFUSE_HOST=http://langfuse:3000
      - DATABASE_URL=postgres://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWORD}@postgres:5432/${POSTGRES_DB_NAME}
    networks:
      - ai_net
      - monitoring-net
    command: sleep infinity


  autogen-studio:
    build:
      context: ./agents/autogen
    container_name: autogen-studio
    volumes:
      - ./autogen_data:/data/autogen_data
    ports:
      - "8081:8081"
    networks:
      - ai_net
    profiles: ["disabled"]

  dns:
    image: strm/dnsmasq
    container_name: dns
    volumes:
      - ./ai-assistant-infra/configs/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf
    #ports:
    #  - "53:53/udp"
    #  - "53:53/tcp"
    cap_add:
      - NET_ADMIN
    networks:
      - ai_net # Must be the same network as Nginx and OpenHands
      - monitoring-net

volumes:
  postgres_db: 
  n8n_data: 
  openobserve_storage: 
  clickhouse_data: 
  qdrant_data: 
  minio_data: 
  rabbitmq_data: 
  ollama_models: 
  langfuse_redis_data: 
  redis_agents_data: 
  opencode_data: 
  langgraph_config: 
  langgraph_data:
  langfuse_data: 
  openhands_state:  
networks:
  ai_net:
    driver: bridge
  monitoring-net:
    driver: bridge
