# Agentic stack — dev + live tiers only.
# Platform substrate (db-bootstrapper, migrate, postgres, rabbitmq, redis, nginx, CI)
# lives in docker-compose.platform.yml. Networks are declared EXTERNAL there.
# Start platform first, then: docker compose up -d

services:
  # ===================== LIVE TIER (promoted, prod builds) =====================
  control-center-ui:
    build:
      context: ./agentic/src/control-center-ui
      dockerfile: Dockerfile
      target: live
    container_name: control_center_ui
    expose:
      - 80
    networks:
      - ai_net
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./agentic/src/workflow-runner
      dockerfile: Dockerfile
    container_name: workflow_engine
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URL=postgresql://${AIASSIST_LIVE_DB_USER}:${AIASSIST_LIVE_DB_PASSWORD}@postgres:5432/${AIASSIST_LIVE_DB_NAME}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - LANGGRAPH_URL=http://langgraph:8000
      - REPO_ROOT=/aiassistant
      - ENV_TIER=live
    networks:
      - ai_net
    restart: unless-stopped
    entrypoint:
      - python3
      - /wait_for.py
      - postgres:5432
      - rabbitmq:5672
      - langgraph:8000
      - "--"
      - uvicorn
      - api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    volumes:
      - .:/aiassistant:cached,z
      - ./infra/wait_for.py:/wait_for.py:ro

  langgraph:
    build:
      context: ./agents/langgraph
      dockerfile: Dockerfile
    container_name: langgraph
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URI=postgresql://${LANGGRAPH_LIVE_DB_USER}:${LANGGRAPH_LIVE_DB_PASSWORD}@postgres:5432/${LANGGRAPH_LIVE_DB_NAME}
      - REDIS_URI=redis://redis-agents:6379
      - ENV_TIER=live
    networks:
      - ai_net
      - monitoring-net
    restart: unless-stopped
    volumes:
      - langgraph_config:/app/config

  # ===================== DEV TIER (convenience, source-mounted) =====================
  dev-controller:
    image: node:20-alpine
    container_name: dev_controller
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 8443 --host 0.0.0.0"
    volumes:
      - ./agentic/src/control-center-ui:/app
      - /app/node_modules
    expose:
      - 8443
    networks:
      - ai_net
    restart: unless-stopped

  dev-workflow-engine:
    build:
      context: ./agentic/src/workflow-runner
      dockerfile: Dockerfile
    container_name: dev_workflow_engine
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URL=postgresql://${AIASSIST_DEV_DB_USER}:${AIASSIST_DEV_DB_PASSWORD}@postgres:5432/${AIASSIST_DEV_DB_NAME}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - LANGGRAPH_URL=http://dev-langgraph:8000
      - REPO_ROOT=/aiassistant
      - ENV_TIER=dev
    networks:
      - ai_net
    restart: unless-stopped
    entrypoint:
      - python3
      - /wait_for.py
      - postgres:5432
      - rabbitmq:5672
      - dev-langgraph:8000
      - "--"
      - uvicorn
      - api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    volumes:
      - .:/aiassistant:cached,z
      - ./infra/wait_for.py:/wait_for.py:ro

  dev-langgraph:
    build:
      context: ./agents/langgraph
      dockerfile: Dockerfile
    container_name: dev_langgraph
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URI=postgresql://${LANGGRAPH_DEV_DB_USER}:${LANGGRAPH_DEV_DB_PASSWORD}@postgres:5432/${LANGGRAPH_DEV_DB_NAME}
      - REDIS_URI=redis://redis-agents:6379
      - ENV_TIER=dev
    networks:
      - ai_net
      - monitoring-net
    restart: unless-stopped
    volumes:
      - ./agents/langgraph/src:/app:cached

  autogen-studio:
    build:
      context: ./agents/autogen
    container_name: autogen-studio
    volumes:
      - ./autogen_data:/data/autogen_data
    ports:
      - "8081:8081"
    networks:
      - ai_net
    profiles: ["disabled"]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - DB_TYPE=${N8N_DB_TYPE}
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_DATABASE}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_OTEL_ENABLED=${N8N_OTEL_ENABLED}
      - N8N_OTEL_SERVICE_NAME=${N8N_OTEL_SERVICE_NAME}
      - N8N_OTEL_EXPORTER_OTLP_ENDPOINT=${N8N_OTEL_EXPORTER_OTLP_ENDPOINT}
      - LANGCHAIN_TRACING_V2=${N8N_LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${N8N_LANGCHAIN_API_KEY}
      - LANGCHAIN_ENDPOINT=${N8N_LANGCHAIN_ENDPOINT}
      - LANGCHAIN_PROJECT=${N8N_LANGCHAIN_PROJECT}
    profiles: ["disabled"]
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - n8n_data:/home/node/.n8n

networks:
  ai_net:
    external: true
  monitoring-net:
    external: true

volumes:
  langgraph_config:
  langgraph_data:
  n8n_data:
