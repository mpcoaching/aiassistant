# =============================================================================
# Dev environment — app/worker services on dev-network ONLY.
# Reaches shared platform services via dev-platform-gateway (stream + http).
# Images come from the private registry and are IMMUTABLE (<git-sha>).
#   IMAGE_TAG / REGISTRY_URL are supplied by the CI deploy (env vars).
#   docker compose -f environments/dev/compose.yml up -d
# =============================================================================
name: dev

services:
  dev-control-center-ui:
    image: ${REGISTRY_URL}/control-center-ui:${IMAGE_TAG}
    container_name: dev_control_center_ui
    ports:
      - "5173:80"
    expose:
      - 80
    networks:
      - dev-network
    restart: unless-stopped

  dev-workflow-engine:
    image: ${REGISTRY_URL}/workflow-runner:${IMAGE_TAG}
    container_name: dev_workflow_engine
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    expose:
      - 8000
    environment:
      # Platform backends reached ONLY through the dev gateway (no direct net).
      - DATABASE_URL=postgresql://${AGENT_DEV_DB_USER}:${AGENT_DEV_DB_PASSWORD}@dev-platform-gateway:5432/${AGENT_DEV_DB_NAME}
      - RABBITMQ_URL=amqp://guest:guest@dev-platform-gateway:5672/
      - REDIS_URL=redis://dev-platform-gateway:6379
      - LANGGRAPH_URL=http://dev-langgraph:8000
      - OPENAI_API_BASE=http://dev-platform-gateway:4000/v1
      - OPENAI_BASE_URL=http://dev-platform-gateway:4000/v1
      - REPO_ROOT=/aiassistant
      - ENV_TIER=dev
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    entrypoint:
      - python3
      - /wait_for.py
      - dev-platform-gateway:5432
      - dev-platform-gateway:5672
      - dev-langgraph:8000
      - "--"
      - uvicorn
      - api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    volumes:
      - ../../infra/wait_for.py:/wait_for.py:ro
      - ../../packages/workflow-runner/src:/aiassistant/packages/workflow-runner/src:ro
      - ../../packages/ai/src:/aiassistant/packages/ai/src:ro
      - ../../packages/bus/src:/aiassistant/packages/bus/src:ro
      - ../../packages/langgraph/src:/aiassistant/packages/langgraph/src:ro
      - ../../packages/capability_registry/src:/aiassistant/packages/capability_registry/src:ro
    networks:
      - dev-network
    restart: unless-stopped

  dev-langgraph:
    image: ${REGISTRY_URL}/langgraph:${IMAGE_TAG}
    container_name: dev_langgraph
    env_file:
      - ../../.env
    ports:
      - "5173:80"
    expose:
      - 8000
    environment:
      - DATABASE_URI=postgresql://${LANGGRAPH_DEV_DB_USER}:${LANGGRAPH_DEV_DB_PASSWORD}@dev-platform-gateway:5432/${LANGGRAPH_DEV_DB_NAME}
      - REDIS_URI=redis://dev-platform-gateway:6379
      - ENV_TIER=dev
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    volumes:
      - langgraph_config:/app/config
    networks:
      - dev-network
    restart: unless-stopped

networks:
  dev-network:
    name: dev-network
    external: true

volumes:
  langgraph_config:
