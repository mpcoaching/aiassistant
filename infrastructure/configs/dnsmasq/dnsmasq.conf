# 1. Localhost override
address=/localhost/127.0.0.1

# 2. The local override - map all .local.test to Docker host
address=/.local.test/127.0.0.1

# 2b. Explicit environment subdomains (covered by the wildcard above, but
#     listed for clarity and to make intent obvious to operators):
address=/.dev.local.test/127.0.0.1
address=/.live.local.test/127.0.0.1

# 3. Forward everything else to standard public resolvers
server=8.8.8.8
server=1.1.1.1

# 4. Prevent local traffic from leaking to public DNS
domain-needed
bogus-priv

no-hosts
