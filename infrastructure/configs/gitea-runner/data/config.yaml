log:
  level: "info"

runner:
  capacity: 2
  timeout: "3h"
  insecure: true        # Kept true if your Gitea instance uses self-signed certs

cache:
  enabled: true

container:
  image: "gitea/runner-images:ubuntu-latest"  # Replaces raw node:20
  network: "bridge"
  force_pull: true                            # Ensures you always get the latest ecosystem updates
