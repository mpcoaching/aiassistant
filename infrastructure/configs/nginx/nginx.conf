# Outer nginx — client entry. Attaches to infra + platform networks only.
# Proxies client traffic to the per-environment gateways (dev/live) and to
# platform/control-plane UIs. Host header is preserved end-to-end.
#
# NOTE: platform services and the gateways are created by OTHER compose
# projects (started after this one). Static upstreams would fail to resolve at
# nginx startup, so ALL proxy_pass targets use the resolver + variable pattern
# (lazy resolution at request time).
events { worker_connections 4096; }

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 3600s;

    ssl_certificate /etc/nginx/certs/local.test.crt;
    ssl_certificate_key /etc/nginx/certs/local.test.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server {
        listen 80 default_server;
        server_name _;
        # All client traffic is HTTPS (self-signed local.test cert). Browsers
        # default to http://, which would otherwise hit this 404. Redirect
        # plain-HTTP -> HTTPS, preserving host + path.
        return 301 https://$host$request_uri;
    }

    # ----- Per-environment gateways (platform access boundary) -----
    server {
        listen 443 ssl; server_name agent.dev.local.test;
        location / { set $target "dev-platform-gateway:80"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name api.dev.local.test;
        location / { set $target "dev-platform-gateway:80"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name langgraph.dev.local.test;
        location / { set $target "dev-platform-gateway:80"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name agent.live.local.test;
        location / { set $target "live-platform-gateway:80"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name api.live.local.test;
        location / { set $target "live-platform-gateway:80"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name langgraph.live.local.test;
        location / { set $target "live-platform-gateway:80"; proxy_pass http://$target; }
    }

    # ----- Control plane (nginx reaches directly on platform/infra nets) -----
    server {
        listen 443 ssl; server_name gitea.local.test;
        location / { set $target "infra_gitea:3000"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name registry.local.test;
        # Registry serves plain HTTP internally; TLS terminated here. Basic
        # auth is enforced by the registry container (Authorization passes through).
        client_max_body_size 0;
        location / { set $target "registry:5000"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name oo.local.test;
        location / { set $target "openobserve:5080"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name otel.local.test;
        location / { set $target "otel-collector:4318"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name gateway.local.test;
        location / { set $target "portkey:4000"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name portkey.local.test;
        location / { set $target "portkey:8787"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name lf.local.test;
        location / { set $target "langfuse:3000"; proxy_pass http://$target; }
    }
    server {
        listen 443 ssl; server_name qdrant.local.test;
        client_max_body_size 100M;
        location / {
            set $target "qdrant:6333";
            proxy_pass http://$target;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
    server {
        listen 6334 ssl;
        server_name qdrant.local.test;
        location / {
            set $qt "qdrant:6334";
            grpc_pass grpc://$qt;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
