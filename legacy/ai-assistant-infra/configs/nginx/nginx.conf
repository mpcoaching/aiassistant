events { worker_connections 1024; }
http {
    resolver 127.0.0.11 valid=5s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 3600s;

    ssl_certificate /etc/nginx/certs/local.test.crt;
    ssl_certificate_key /etc/nginx/certs/local.test.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server {
        listen 80 default_server;
        server_name _;
        return 404 "Subdomain not configured or missing Host header";
    }

    server {
        listen 80;
        server_name gitea.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name gitea.local.test;
        location / {
            proxy_pass http://gitea:3000;
        }
    }

    server {
        listen 80;
        server_name teamcity.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name teamcity.local.test;
        location / {
            proxy_pass http://teamcity-server:8111;
        }
    }

    server {
        listen 80;
        server_name oo.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name oo.local.test;
        location / {
            proxy_pass http://openobserve:5080;
        }
    }

    server {
        listen 80;
        server_name lf.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name lf.local.test;
        location / {
            proxy_pass http://langfuse:3000;
        }
    }

    server {
        listen 80;
        server_name otel.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name otel.local.test;
        location / {
            proxy_pass http://otel-collector:4318;
        }
    }

    server {
        listen 80;
        server_name litellm.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name litellm.local.test;
        location / {
            proxy_pass http://litellm:4000;
        }
    }

    server {
        listen 80;
        server_name langgraph.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name langgraph.local.test;
        location / {
            proxy_pass http://langgraph:8000;
        }
    }

    server {
        listen 80;
        server_name workflow-engine.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name workflow-engine.local.test;
        location / {
            proxy_pass http://workflow-engine:8000;
        }
    }

    server {
        listen 80;
        server_name control-center.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name control-center.local.test;
        location / {
            proxy_pass http://control-center-ui:80;
        }
    }

    server {
        listen 80;
        server_name qdrant.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name qdrant.local.test;

        client_max_body_size 100M;

        location / {
            proxy_pass http://qdrant:6333;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name qdrant.local.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 6334;
        listen 443 ssl;
        server_name qdrant.local.test;

        location / {
            grpc_pass grpc://qdrant:6334;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

}
