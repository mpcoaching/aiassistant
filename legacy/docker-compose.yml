# Agentic stack — dev + live tiers only.
# Platform substrate (db-bootstrapper, migrate, postgres, rabbitmq, redis, nginx, CI)
# lives in docker-compose.platform.yml. Networks are declared EXTERNAL there.
# Start platform first, then: docker compose up -d

services:
  # ===================== LIVE TIER (promoted, prod builds) =====================
  control-center-ui:
    build:
      context: ./agentic/src/control-center-ui
      dockerfile: Dockerfile
      target: live
    container_name: control_center_ui
    expose:
      - 80
    networks:
      - ai_net
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./agentic/src/workflow-runner
      dockerfile: Dockerfile
    container_name: workflow_engine
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URL=postgresql://${AIASSIST_LIVE_DB_USER}:${AIASSIST_LIVE_DB_PASSWORD}@postgres:5432/${AIASSIST_LIVE_DB_NAME}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - LANGGRAPH_URL=http://langgraph:8000
      - REPO_ROOT=/aiassistant
      - ENV_TIER=live
    networks:
      - ai_net
    restart: unless-stopped
    entrypoint:
      - python3
      - /wait_for.py
      - postgres:5432
      - rabbitmq:5672
      - langgraph:8000
      - "--"
      - uvicorn
      - api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    volumes:
      - .:/aiassistant:cached,z
      - ./infra/wait_for.py:/wait_for.py:ro

  langgraph:
    build:
      context: ./agents/langgraph
      dockerfile: Dockerfile
    container_name: langgraph
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URI=postgresql://${LANGGRAPH_LIVE_DB_USER}:${LANGGRAPH_LIVE_DB_PASSWORD}@postgres:5432/${LANGGRAPH_LIVE_DB_NAME}
      - REDIS_URI=redis://redis-agents:6379
      - ENV_TIER=live
    networks:
      - ai_net
      - monitoring-net
    restart: unless-stopped
    volumes:
      - langgraph_config:/app/config

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    expose:
      - 4000
    env_file:
      - .env
    environment:
      - STORE_MODEL_IN_DB=False
      - LITELLM_CONFIG_PATH=/app/config/config.yaml
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - DATABASE_URL=postgresql://${LITELLM_LIVE_DB_USER}:${LITELLM_LIVE_DB_PASSWORD}@postgres:5432/${LITELLM_LIVE_DB_NAME}
      - REDIS_URL=redis://redis-agents:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RELOAD_CONFIG_FROM_DISK=True
      - ENV_TIER=live
    networks:
      - ai_net
    entrypoint:
      - python3
      - /wait_for.py
      - postgres:5432
      - redis-agents:6379
      - "--"
      - litellm
      - --config
      - /app/config/config.yaml
      - --port
      - "4000"
    volumes:
      - ./ai-assistant-infra/configs/litellm/config.yaml:/app/config/config.yaml
      - ./infra/wait_for.py:/wait_for.py:ro

  # ===================== DEV TIER (convenience, source-mounted) =====================
  dev-controller:
    image: node:20-alpine
    container_name: dev_controller
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 8443 --host 0.0.0.0"
    volumes:
      - ./agentic/src/control-center-ui:/app
      - /app/node_modules
    expose:
      - 8443
    networks:
      - ai_net
    restart: unless-stopped

  dev-workflow-engine:
    build:
      context: ./agentic/src/workflow-runner
      dockerfile: Dockerfile
    container_name: dev_workflow_engine
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URL=postgresql://${AIASSIST_DEV_DB_USER}:${AIASSIST_DEV_DB_PASSWORD}@postgres:5432/${AIASSIST_DEV_DB_NAME}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - LANGGRAPH_URL=http://dev-langgraph:8000
      - REPO_ROOT=/aiassistant
      - ENV_TIER=dev
    networks:
      - ai_net
    restart: unless-stopped
    entrypoint:
      - python3
      - /wait_for.py
      - postgres:5432
      - rabbitmq:5672
      - dev-langgraph:8000
      - "--"
      - uvicorn
      - api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    volumes:
      - .:/aiassistant:cached,z
      - ./infra/wait_for.py:/wait_for.py:ro

  dev-langgraph:
    build:
      context: ./agents/langgraph
      dockerfile: Dockerfile
    container_name: dev_langgraph
    env_file:
      - .env
    expose:
      - 8000
    environment:
      - DATABASE_URI=postgresql://${LANGGRAPH_DEV_DB_USER}:${LANGGRAPH_DEV_DB_PASSWORD}@postgres:5432/${LANGGRAPH_DEV_DB_NAME}
      - REDIS_URI=redis://redis-agents:6379
      - ENV_TIER=dev
    networks:
      - ai_net
      - monitoring-net
    restart: unless-stopped
    volumes:
      - ./agents/langgraph/src:/app:cached

  dev-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: dev_litellm
    expose:
      - 4000
    env_file:
      - .env
    environment:
      - STORE_MODEL_IN_DB=False
      - LITELLM_CONFIG_PATH=/app/config/config.yaml
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - DATABASE_URL=postgresql://${LITELLM_DEV_DB_USER}:${LITELLM_DEV_DB_PASSWORD}@postgres:5432/${LITELLM_DEV_DB_NAME}
      - REDIS_URL=redis://redis-agents:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RELOAD_CONFIG_FROM_DISK=True
      - ENV_TIER=dev
    networks:
      - ai_net
    entrypoint:
      - python3
      - /wait_for.py
      - postgres:5432
      - redis-agents:6379
      - "--"
      - litellm
      - --config
      - /app/config/config.yaml
      - --port
      - "4000"
    volumes:
      - ./ai-assistant-infra/configs/litellm/config.yaml:/app/config/config.yaml
      - ./infra/wait_for.py:/wait_for.py:ro

  # ===================== OPTIONAL (disabled by default) =====================
  openhands:
    image: ghcr.io/openhands/openhands:latest
    container_name: openhands
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=latest-python
      - WORKSPACE_MOUNT_PATH=/opt/workspace_base
      - LOG_ALL_EVENTS=true
      - LLM_MODEL=groq/openai/gpt-oss-120b
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_API_KEY=${FULL_ACCESS_KEY}
      - LLM_API_KEY=${FULL_ACCESS_KEY}
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENHANDS_CONFIG_DIR=/home/openhands/.openhands
      - OH_SKIP_AGENT_SERVER_VERSION_CHECK=1
      - DISABLE_DEFAULT_MCP_SERVER=1
      - PYTHONPATH=/app:/app/openhands:/runtime/openhands
      - SANDBOX_RUNTIME_NETWORK=ai_net
      - SANDBOX_RUNTIME_BINDING_ADDRESS=0.0.0.0
      - WORKSPACE_MOUNT_PATH=${PWD}/workspace
      - SANDBOX_CONTAINER_URL_PATTERN=http://openhands.local.test:{port}
      - OH_WEB_URL=http://openhands.local.test
      - WEB_HOST=openhands:3000
      - OH_USE_HOST_NETWORK=true
      - RUNTIME_IMAGE=ghcr.io/all-hands-ai/runtime:latest
      - RUNTIME_CONTAINER_NAME=openhands-sandbox
      - SANDBOX_DNS=192.168.1.238
      - USE_HTTPS=false
      - DISABLE_HTTPS_REDIRECT=true
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    profiles: ["disabled"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
      - ./workspace:/opt/workspace_base
      - ./ai-assistant-infra/configs/openhands/.openhands/skills:/root/.openhands/skills
      - ./ai-assistant-infra/configs/openhands/.openhands:/home/openhands/.openhands
    networks:
      - ai_net

  aider:
    image: paulgauthier/aider-full:latest
    container_name: aider
    tty: true
    stdin_open: true
    command: ["--browser", "--model", "litellm_proxy/coding"]
    volumes:
      - .:/app
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=http://litellm:4000/v1
      - GIT_CEILING_DIRECTORIES=/app
      - AIDER_CONFIG=${AIDER_CONFIG:-.aider/code-phase.yml}
    networks:
      - ai_net
    depends_on:
      - litellm
    profiles: ["disabled"]

  autogen-studio:
    build:
      context: ./agents/autogen
    container_name: autogen-studio
    volumes:
      - ./autogen_data:/data/autogen_data
    ports:
      - "8081:8081"
    networks:
      - ai_net
    profiles: ["disabled"]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - DB_TYPE=${N8N_DB_TYPE}
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_DATABASE}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_OTEL_ENABLED=${N8N_OTEL_ENABLED}
      - N8N_OTEL_SERVICE_NAME=${N8N_OTEL_SERVICE_NAME}
      - N8N_OTEL_EXPORTER_OTLP_ENDPOINT=${N8N_OTEL_EXPORTER_OTLP_ENDPOINT}
      - LANGCHAIN_TRACING_V2=${N8N_LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${N8N_LANGCHAIN_API_KEY}
      - LANGCHAIN_ENDPOINT=${N8N_LANGCHAIN_ENDPOINT}
      - LANGCHAIN_PROJECT=${N8N_LANGCHAIN_PROJECT}
    profiles: ["disabled"]
    networks:
      - ai_net
      - monitoring-net
    volumes:
      - n8n_data:/home/node/.n8n

networks:
  ai_net:
    external: true
  monitoring-net:
    external: true

volumes:
  langgraph_config:
  langgraph_data:
  openhands_state:
  n8n_data:
