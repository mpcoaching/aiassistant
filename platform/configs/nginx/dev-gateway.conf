# dev-platform-gateway — ONLY bridge dev-network <-> platform-network.
# TCP streams from dev apps -> platform backends. HTTP Host-based ingress
# (reached by outer nginx-proxy via http://dev-platform-gateway) -> dev apps.
# All proxy targets use resolver + variable form so the gateway starts even
# before the platform services exist.
worker_processes auto;
error_log /var/log/nginx/gateway_error.log warn;
events { worker_connections 4096; }

stream {
  resolver 127.0.0.11 valid=5s ipv6=off;

  server { listen 5432;     set $b "postgres:5432";        proxy_pass $b; }
  server { listen 6379;     set $b "redis-agents:6379";     proxy_pass $b; }
  server { listen 6333;     set $b "qdrant:6333";           proxy_pass $b; }
  server { listen 6334;     set $b "qdrant:6334";           proxy_pass $b; }
  server { listen 5672;     set $b "rabbitmq:5672";         proxy_pass $b; }
  server { listen 4000;     set $b "litellm:4000";          proxy_pass $b; }
  server { listen 4318;     set $b "otel-collector:4318";   proxy_pass $b; }
  server { listen 3000;     set $b "langfuse:3000";         proxy_pass $b; }
}

http {
  resolver 127.0.0.11 valid=5s ipv6=off;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_buffering off;
  proxy_read_timeout 3600s;

  server {
    listen 80 default_server;
    server_name agent.dev.local.test;
    location / { set $up "dev-control-center-ui:80";  proxy_pass http://$up; }
  }
  server {
    listen 80;
    server_name api.dev.local.test;
    location / { set $up "dev-workflow-engine:8000"; proxy_pass http://$up; }
  }
  server {
    listen 80;
    server_name langgraph.dev.local.test;
    location / { set $up "dev-langgraph:8000";        proxy_pass http://$up; }
  }
}
